<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <!-- 設定網頁編碼 -->
    <meta charset="UTF-8">

    <!-- 設定 RWD 顯示 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 頁面標題 -->
    <title>{% block title %}JobCheck 求職公開紀錄分析系統{% endblock %}</title>

    <!-- 載入 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <!-- 頂部導覽列 -->
    <header class="topbar">
        <!-- 網站名稱 -->
        <a class="brand" href="/">JobCheck</a>

        <!-- 導覽選單 -->
        <nav class="nav">
            <a href="/">首頁</a>
            <a href="/search">公司查詢</a>
            <a href="/dashboard">趨勢儀表板</a>
            <a href="/records">公開紀錄</a>
            <a href="/about">資料處理說明</a>
        </nav>
    </header>

    <!-- 主要內容區 -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
